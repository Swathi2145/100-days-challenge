<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div id="fruits">
  <span style="cursor: pointer;">🍎</span>
  <span style="cursor: pointer;">🍌</span>
  <span style="cursor: pointer;">🍇</span>
</div>

<p id="message"></p>


<script>

const basket = document.getElementById('fruits');
const display = document.getElementById('message');

basket.onclick = function(e) {
  
  if (e.target.tagName === 'SPAN') {
    const fruitEmoji = e.target.textContent;
    
    display.textContent = "You eat the " + fruitEmoji + "!";
  }
};

</script>
</body>
</html>
